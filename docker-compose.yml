version: "3.8"

services:
    api:
        build: .
        container_name: baileys-wa-api
        restart: unless-stopped
        ports:
            - "${PORT:-3000}:3000"
        env_file:
            - .env
        environment:
            - REDIS_ENABLED=true
            - REDIS_URL=redis://redis:6379
        volumes:
            - ./sessions:/app/sessions
            - ./media:/app/media
            - ./logs:/app/logs
            - ./data:/app/data
        depends_on:
            redis:
                condition: service_healthy

    redis:
        image: redis:alpine
        container_name: baileys-wa-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
    redis-data:
